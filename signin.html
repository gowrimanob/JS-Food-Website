<body>

    <div class="i-box">

<span>If u r not signed in . First </span>

    <br>

<script>
    function signin() {
        var mail = document.querySelector('input[type="email"]').value;
        var pwd = document.querySelector('input[type="password"]').value;

        var storedData = localStorage.getItem(mail); // Retrieve data using the mail key 

        if (storedData) {
            var parsedData = JSON.parse(storedData);
            var storedmail = parsedData.mail;
            var storedpwd = parsedData.pwd;

            console.log(mail, pwd, storedmail, storedpwd);

            if (mail === storedmail && pwd === storedpwd) {
   localStorage.setItem("currentUser", parsedData.uname); // ⭐ store username
    window.location.href = "index.html";
} else {
                alert('Invalid username or password.');
            }
        }
        else {
            alert('User not found ! Sign up first Buddy !');
        }

    }

</script>
